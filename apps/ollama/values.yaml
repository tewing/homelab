ollama:
  replicaCount: 1

  ollama:
    gpu:
      enabled: false
      # type: nvidia
    models:
      pull: []
      # - llama3.2
      # - mistral

  persistentVolume:
    enabled: true
    size: 30Gi

  ingress:
    enabled: true
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: ollama.example.com
        paths:
          - path: /
            pathType: Prefix
    # tls:
    #   - secretName: ollama-tls
    #     hosts:
    #       - ollama.te-lab.org
